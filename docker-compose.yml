# Run everything:  docker compose up
# Postgres only:   docker compose up db
# Stop & wipe DB:  docker compose down -v

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backstage']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backstage ──────────────────────────────────────────────────────────────
  backstage:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - '7007:7007'
    environment:
      # Backend-to-backend auth secret — override with a strong random value in prod
      BACKEND_SECRET: 'local-dev-secret-change-in-prod-32chars!!'
      # GitLab integration
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_OAUTH_CLIENT_ID: ${GITLAB_OAUTH_CLIENT_ID}
      GITLAB_OAUTH_CLIENT_SECRET: ${GITLAB_OAUTH_CLIENT_SECRET}
      # Database — points to the db service above
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: backstage
      POSTGRES_PASSWORD: backstage
      POSTGRES_DB: backstage
    depends_on:
      db:
        condition: service_healthy
    # Mount local config overlay so you can iterate without rebuilding
    volumes:
      - ./app-config.local.yaml:/app/app-config.local.yaml:ro

volumes:
  postgres_data:
